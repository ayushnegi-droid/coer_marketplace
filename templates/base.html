<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}COER University Marketplace{% endblock %}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #4f46e5; --primary-light: #818cf8; --primary-soft: #eef2ff;
            --accent: #f59e0b; --bg: #f8f9ff; --bg-card: #ffffff;
            --text: #0f172a; --text-muted: #64748b; --text-light: #94a3b8;
            --border: #e8ecf4; --success: #10b981; --danger: #ef4444; --sold: #6b7280;
            --shadow-xs: 0 1px 3px rgba(15,23,42,0.06);
            --shadow-sm: 0 2px 8px rgba(15,23,42,0.08);
            --shadow-md: 0 8px 24px rgba(15,23,42,0.10);
            --shadow-lg: 0 20px 48px rgba(15,23,42,0.14);
            --r: 14px; --r-sm: 8px; --r-lg: 20px;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
        h1,h2,h3,h4 { font-family: 'Sora', sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        /* NAVBAR */
        .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; padding: 14px 0; }
        .nav-inner { display: flex; align-items: center; gap: 16px; }
        .logo { font-family: 'Sora', sans-serif; font-size: 1.35rem; font-weight: 800; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .logo span { color: var(--accent); }
        .search-wrap { flex: 1; max-width: 420px; position: relative; }
        .search-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-light); pointer-events: none; font-size: 0.9rem; }
        .search-input { width: 100%; padding: 11px 16px 11px 40px; border: 2px solid var(--border); border-radius: 40px; font-size: 0.92rem; font-family: inherit; background: var(--bg); color: var(--text); transition: all 0.2s; }
        .search-input:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(79,70,229,0.08); }
        .nav-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }

        /* BUTTONS */
        .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: 40px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; text-decoration: none; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: #3730a3; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(79,70,229,0.3); }
        .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
        .btn-outline:hover { background: var(--primary-soft); }
        .btn-ghost { background: transparent; color: var(--text-muted); border: 2px solid var(--border); }
        .btn-ghost:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-soft); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-sm { padding: 7px 14px; font-size: 0.82rem; }
        .btn-full { width: 100%; justify-content: center; }

        /* AVATAR */
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-light)); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 0.95rem; border: 2px solid transparent; transition: all 0.2s; font-family: 'Sora', sans-serif; overflow: hidden; flex-shrink: 0; text-decoration: none; }
        .avatar:hover { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.15); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* FORMS */
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-weight: 600; font-size: 0.88rem; margin-bottom: 7px; color: var(--text); }
        .form-label span { color: var(--text-light); font-weight: 400; }
        .form-input, .form-textarea, .form-select { width: 100%; padding: 12px 14px; border: 2px solid var(--border); border-radius: var(--r); font-size: 0.95rem; font-family: inherit; color: var(--text); background: var(--bg); transition: all 0.2s; }
        .form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(79,70,229,0.08); }
        .form-textarea { resize: vertical; min-height: 100px; }
        .form-error { color: var(--danger); font-size: 0.8rem; margin-top: 5px; display: block; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        /* BADGES */
        .badge { position: absolute; top: 10px; left: 0; padding: 4px 10px 4px 8px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #fff; border-radius: 0 20px 20px 0; font-family: 'Sora', sans-serif; }
        .badge-new { background: var(--success); }
        .badge-sold { background: var(--sold); }
        .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; font-family: 'Sora', sans-serif; }
        .status-available { background: #d1fae5; color: #065f46; }
        .status-sold { background: #f3f4f6; color: #374151; }

        /* EMPTY STATE */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-icon { font-size: 3.5rem; margin-bottom: 14px; opacity: 0.4; }
        .empty-state h3 { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
        .empty-state p { font-size: 0.9rem; }

        /* BACK BUTTON */
        .back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 0.88rem; font-weight: 600; margin-bottom: 24px; text-decoration: none; transition: color 0.2s; }
        .back-btn:hover { color: var(--primary); }

        /* TOAST */
        #toast { position: fixed; bottom: 28px; right: 28px; background: var(--text); color: #fff; padding: 14px 20px; border-radius: var(--r); font-size: 0.9rem; font-weight: 500; box-shadow: var(--shadow-lg); z-index: 9999; transform: translateY(80px) scale(0.9); opacity: 0; transition: all 0.3s; pointer-events: none; display: flex; align-items: center; gap: 10px; }
        #toast.show { transform: translateY(0) scale(1); opacity: 1; }
        #toast.success { background: var(--success); }
        #toast.error { background: var(--danger); }
        #toast.info { background: var(--primary); }

        /* SKELETON */
        .skeleton { background: linear-gradient(90deg,#f0f2f8 25%,#e4e7f0 50%,#f0f2f8 75%); background-size: 300% 100%; animation: shimmer 1.4s infinite; border-radius: var(--r-sm); }
        @keyframes shimmer { 0%{background-position:300% 0} 100%{background-position:-300% 0} }
        .skel-card { height: 300px; border-radius: var(--r); }

        /* RESPONSIVE */
@media(max-width:768px){

    .container {
        padding: 0 14px;
    }

    .nav-inner {
        flex-wrap: wrap;
        gap: 12px;
    }

    .search-wrap {
        order: 3;
        max-width: 100%;
        flex: 0 0 100%;
    }

    .nav-right {
        margin-left: 0;
    }

    .form-row {
        grid-template-columns: 1fr;
    }

    .logo {
        font-size: 1.05rem;
    }

    .btn {
        padding: 10px 16px;
        font-size: 0.85rem;
    }

    .search-input {
        font-size: 0.9rem;
    }

    /* DASHBOARD STATS */
    .stats-grid,
    .dashboard-stats {
        display: grid !important;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }

    /* MESSAGE TABS */
    .message-tabs,
    .dashboard-tabs {
        display: flex;
        flex-wrap: nowrap;
        overflow-x: auto;
        gap: 8px;
        scrollbar-width: none;
    }

    .message-tabs::-webkit-scrollbar,
    .dashboard-tabs::-webkit-scrollbar {
        display: none;
    }

    .message-tabs button,
    .dashboard-tabs button {
        white-space: nowrap;
        flex-shrink: 0;
    }

    /* FILTER */
    .filters,
    .filter-bar,
    .filter-wrap {
        display: flex !important;
        flex-wrap: wrap;
        gap: 10px;
    }

    .filters > *,
    .filter-bar > *,
    .filter-wrap > * {
        flex: 1 1 calc(50% - 10px);
        min-width: 120px;
    }

    /* ITEM GRID */
    .item-grid,
    .listing-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
    }

    /* SELLER NAME */
    .seller-name,
    .item-seller,
    .listing-seller {
        font-size: 0.8rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    /* CHAT */
    .chat-container {
        height: calc(100vh - 80px);
        display: flex;
        flex-direction: column;
    }

    .chat-messages {
        flex: 1;
        overflow-y: auto;
    }

    .chat-input-area,
    .message-input-wrap {
        position: sticky;
        bottom: 0;
        background: white;
        padding: 10px;
        border-top: 1px solid var(--border);
    }

    /* PRODUCT PAGE */
    .product-title {
        font-size: 1.8rem !important;
    }

    .price {
        font-size: 1.5rem !important;
    }
}

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

{% if user.is_authenticated %}
<nav class="navbar">
    <div class="container">
        <div class="nav-inner">
            <a class="logo" href="{% url 'home' %}">🏫 COER_<span>Marketplace</span></a>
            <form class="search-wrap" method="GET" action="{% url 'home' %}">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input" name="q" placeholder="Search items, books, electronics…" value="{{ request.GET.q|default:'' }}">
            </form>
            <div class="nav-right">
                <a href="{% url 'sell' %}" class="btn btn-primary"><i class="fas fa-plus"></i> Sell Item</a>
                <a href="{% url 'dashboard' %}" class="avatar" title="Dashboard">
                    {% if user.profile.picture %}
                        <img src="{{ user.profile.picture.url }}" alt="">
                    {% else %}
                        {{ user.profile.full_name|first|upper }}
                    {% endif %}
                </a>
            </div>
        </div>
    </div>
</nav>
{% endif %}

{% block content %}{% endblock %}

<div id="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg"></span></div>

<script>
let toastTimer;
function showToast(msg, type='success') {
    const el = document.getElementById('toast');
    const icons = { success:'fa-check-circle', error:'fa-times-circle', info:'fa-info-circle' };
    el.className = type;
    el.innerHTML = `<i class="fas ${icons[type]||'fa-check-circle'}"></i> <span>${msg}</span>`;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}
document.addEventListener('DOMContentLoaded', () => {
    {% for message in messages %}
        showToast("{{ message|escapejs }}", "{{ message.tags }}");
    {% endfor %}
});
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
